# 매일 새벽(한국 시간 05:00) 블로그 RSS를 읽어 홈페이지 소식을 자동 갱신
# GitHub 저장소에 올리면 자동으로 작동합니다 (별도 서버 불필요, 무료)
name: 블로그 소식 자동 갱신

on:
  schedule:
    - cron: "0 20 * * *"   # UTC 20:00 = KST 05:00
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 블로그 RSS 수집
        run: node scripts/fetch-feeds.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name "homepage-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "교회 소식 자동 갱신 $(date +'%Y-%m-%d')"
          git push
